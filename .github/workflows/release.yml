name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.3.3-beta.6
        required: true
      target:
        description: Git ref to build; defaults to the tag
        required: false
      prerelease:
        description: Mark the GitHub release as prerelease
        required: false
        default: 'true'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  github-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            tag="${{ inputs.tag }}"
            target="${{ inputs.target }}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "target=${target:-$tag}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.target }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: make release-all NO_WEB=1

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          prerelease_flag=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/cc-connect-"$TAG"-darwin-amd64.tar.gz \
              dist/cc-connect-"$TAG"-darwin-arm64.tar.gz \
              dist/cc-connect-"$TAG"-linux-amd64.tar.gz \
              dist/cc-connect-"$TAG"-linux-arm64.tar.gz \
              dist/cc-connect-"$TAG"-windows-amd64.zip \
              dist/cc-connect-"$TAG"-windows-arm64.zip \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$TAG" \
              dist/cc-connect-"$TAG"-darwin-amd64.tar.gz \
              dist/cc-connect-"$TAG"-darwin-arm64.tar.gz \
              dist/cc-connect-"$TAG"-linux-amd64.tar.gz \
              dist/cc-connect-"$TAG"-linux-arm64.tar.gz \
              dist/cc-connect-"$TAG"-windows-amd64.zip \
              dist/cc-connect-"$TAG"-windows-arm64.zip \
              dist/checksums.txt \
              --title "$TAG" \
              --generate-notes \
              "${prerelease_flag[@]}"
          fi

  npm-package:
    runs-on: ubuntu-latest
    needs: github-release-assets
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "target=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            target="${{ inputs.target }}"
            echo "target=${target:-${{ inputs.tag }}}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.target }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Publish npm package
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag beta
